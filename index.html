<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kailash kalamkari</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="premium-intro-loader" class="premium-loader">
        <div class="loader-backdrop-pattern"></div>
        <div class="loader-border-frame"></div>
        <div class="loader-content">
            <div class="traditional-mandala-wrapper">
                <svg viewBox="0 0 100 100" class="gold-temple-mandala">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#d4af37" stroke-width="1" stroke-dasharray="3 3"/>
                    <circle cx="50" cy="50" r="38" fill="none" stroke="#d4af37" stroke-width="1.5"/>
                    <path d="M50 5 C55 25, 45 25, 50 5 Z" fill="#d4af37"/>
                    <path d="M50 95 C55 75, 45 75, 50 95 Z" fill="#d4af37"/>
                    <path d="M5 50 C25 55, 25 45, 5 50 Z" fill="#d4af37"/>
                    <path d="M95 50 C75 55, 75 45, 95 50 Z" fill="#d4af37"/>
                    <circle cx="50" cy="50" r="12" fill="#5c130c" stroke="#d4af37" stroke-width="1.5"/>
                    <circle cx="50" cy="50" r="4" fill="#d4af37"/>
                </svg>
            </div>
            <h1 class="intro-title">KAILASH KALAMKARI</h1>
            <p class="intro-subtitle">The Eternal Heritage of Hand-Painted Kalamkari</p>
            <div class="luxury-loading-bar">
                <div class="bar-progress"></div>
            </div>
        </div>
    </div>

    <header class="main-header">
        <div class="header-container" style="justify-content: center; position: relative;">
            <div class="brand-area" style="align-items: center; text-align: center;">
                <!-- Main Title moved to top -->
                <h1>Kailash Kalamkari</h1>
                <!-- Tagline moved to bottom -->
                <p class="brand-tagline" style="margin-top: 0.4rem; margin-bottom: 0;">Authentic Handcrafted Divine Art</p>
                <div class="brand-separator"></div>
            </div>
            <!-- Keeps your gallery button on the right, independent of the centered logo -->
            <div class="header-actions" style="position: absolute; right: 0;">
                <button id="wishlist-trigger" class="wishlist-trigger">
                    <span class="wishlist-icon">♥</span>
                    <span class="wishlist-text">My Gallery</span>
                    <span id="wishlist-count" class="wishlist-badge">0</span>
                </button>
            </div>
        </div>
    </header>

    <section class="search-bar-container">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="Search the heritage collection by fabric name or design...">
        </div>
    </section>

    <section class="department-bar-container">
        <div class="department-bar">
            <button class="department-btn active" data-department="Saree">The Saree Collection</button>
            <button class="department-btn" data-department="Dupatta">The Luxury Dupattas</button>
        </div>
    </section>

    <section class="filters-outer-container">
        <div id="category-filters" class="category-filters"></div>
    </section>

    <main class="container">
        <div id="catalogue-view" class="view active">
            <div id="loading-spinner" class="spinner">
                <div class="spinner-icon"></div>
                <p>Unveiling Hand-Painted Masterpieces...</p>
            </div>
            <div id="product-grid" class="product-grid"></div>
        </div>

        <div id="product-details-view" class="view">
            <div class="back-nav">
                <button id="back-to-catalogue" class="back-btn">
                    <span class="arrow">←</span> Back to Sacred Catalogue
                </button>
            </div>

            <div class="product-details-container">
                <div class="product-image-section">
                    <img id="detail-image" src="" alt="Kalamkari Masterpiece">
                    <div class="luxury-frame-overlay"></div>
                </div>

                <div class="product-info-section">
                    <div class="product-tags">
                        <span id="detail-code" class="tag code-tag"></span>
                        <span id="detail-stock" class="tag stock-tag"></span>
                    </div>

                    <h2 id="detail-title" class="detail-title"></h2>
                    <div class="title-accent-line"></div>
                    <p id="detail-description" class="product-description"></p>

                    <div class="price-card">
                        <span class="price-label">Investment Value</span>
                        <div class="price-wrapper">
                            <span class="currency">INR</span>
                            <span id="detail-price" class="amount"></span>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button id="wishlist-btn" class="premium-btn">
                            <span id="wishlist-btn-text">❤️ Add to Wishlist</span>
                        </button>
                        <button id="buy-now-btn" class="buy-btn">
                            <span id="buy-now-btn-text">🛒 Buy Now</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="wishlist-view" class="view">
            <div class="back-nav">
                <button id="back-from-wishlist" class="back-btn">
                    <span class="arrow">←</span> Resume Heritage Curation
                </button>
            </div>
            <h2 class="section-title">Your Private Collection Vault</h2>
            <div id="wishlist-grid" class="product-grid"></div>
            <div id="wishlist-empty" class="empty-state">
                <p class="empty-icon">⚜</p>
                <p>Your private gallery vault is currently empty.</p>
            </div>
        </div>
    </main>

    <div id="image-overlay" class="image-overlay hidden">
        <div class="overlay-backdrop"></div>
        <div class="overlay-content">
            <button id="overlay-close" class="overlay-close">×</button>
            <img id="overlay-image" src="" alt="High Resolution Motif Detail">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
